services:
  - type: web
    name: pharmabot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}
    envVars:
      - key: LLM_PROVIDER
        value: openrouter
      - key: LLM_MODEL
        value: google/gemma-3-4b-it:free
      - key: LLM_FALLBACK_MODELS
        value: liquid/lfm-2.5-1.2b-instruct:free,google/gemma-3n-e4b-it:free
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: CHROMA_DB_PATH
        value: ./chroma_db
      - key: CONFIDENCE_THRESHOLD
        value: "0.35"
      - key: OPENFDA_CACHE_TTL
        value: "3600"
      - key: OPENROUTER_API_KEY
        sync: false   # Add this manually in Render dashboard → Environment
